<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mydi Car - Motorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#eef2f5; }
    h1 { background:#28a745; color:#fff; padding:15px; margin:0; text-align:center; }
    .screen { display:none; padding:20px; }
    .active { display:block; }
    .card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    input, button { width:100%; padding:12px; margin:5px 0; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
    button { background:#28a745; color:#fff; font-weight:bold; border:none; cursor:pointer; }
    .btn-aceitar { background:#0077cc; margin-top:10px; }
  </style>
</head>
<body>
  <h1>Painel do Motorista</h1>

  <div id="authScreen" class="screen active">
    <div class="card">
      <h3>Dados Pessoais e Veículo</h3>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Senha">
      <hr>
      <input id="nome" placeholder="Seu Nome Completo">
      <input id="modelo" placeholder="Modelo do Carro (Ex: Renegade)">
      <input id="cor" placeholder="Cor do Carro">
      <input id="placa" placeholder="Placa">
      <button onclick="registrarMotorista()">Cadastrar Motorista</button>
      <button onclick="loginMotorista()" style="background:#6c757d;">Já sou cadastrado (Entrar)</button>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <h3>Chamadas em Aberto</h3>
    <div id="listaChamadas"></div>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function registrarMotorista() {
      const dados = {
        nome: document.getElementById("nome").value,
        modelo: document.getElementById("modelo").value,
        cor: document.getElementById("cor").value,
        placa: document.getElementById("placa").value
      };

      auth.createUserWithEmailAndPassword(email.value, password.value).then(userCred => {
        db.ref("usuarios/motoristas/" + userCred.user.uid).set(dados).then(() => {
          alert("Motorista cadastrado com sucesso!");
          entrar();
        });
      }).catch(e => alert(e.message));
    }

    function loginMotorista() {
      auth.signInWithEmailAndPassword(email.value, password.value).then(() => entrar()).catch(e => alert(e.message));
    }

    function entrar() {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('appScreen').classList.add('active');
      ouvirCorridas();
    }

    function ouvirCorridas() {
      db.ref("corridas_ativas").on("value", snap => {
        const lista = document.getElementById("listaChamadas");
        lista.innerHTML = "";
        snap.forEach(corridaSnap => {
          const c = corridaSnap.val();
          if(c.status === "aguardando") {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
              <strong>Destino: ${c.destino}</strong><br>
              Passageiro: ${c.passageiroEmail}<br>
              <button class="btn-aceitar" onclick="aceitarCorrida('${corridaSnap.key}')">ACEITAR CORRIDA</button>
            `;
            lista.appendChild(div);
          }
        });
      });
    }

    function aceitarCorrida(idPassageiro) {
      db.ref("corridas_ativas/" + idPassageiro).update({
        status: "Motorista a caminho",
        motoristaId: auth.currentUser.uid
      }).then(() => alert("Corrida aceita! Vá ao encontro do passageiro."));
    }
  </script>
</body>
</html>
