<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mydi Car - Motorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#eef2f5; }
    h1 { background:#28a745; color:#fff; padding:15px; margin:0; text-align:center; }
    .screen { display:none; padding:20px; }
    .active { display:block; }
    .card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    input, button { width:100%; padding:12px; margin:5px 0; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
    button { background:#28a745; color:#fff; font-weight:bold; border:none; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Painel do Motorista</h1>

  <div id="authScreen" class="screen active">
    <div class="card">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Senha">
      <hr>
      <input id="nome" placeholder="Nome Completo">
      <input id="modelo" placeholder="Modelo do Carro">
      <input id="cor" placeholder="Cor">
      <input id="placa" placeholder="Placa">
      <button onclick="registrar()">Cadastrar e Entrar</button>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <div class="card" style="background:#fff3cd;">📍 Você está online e sendo rastreado</div>
    <h3>Chamadas Próximas</h3>
    <div id="listaChamadas"></div>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('appScreen').classList.add('active');
        iniciarRastreamento();
        ouvirCorridas();
      }
    });

    function registrar() {
      const info = {
        nome: nome.value, modelo: modelo.value, cor: cor.value, placa: placa.value
      };
      auth.createUserWithEmailAndPassword(email.value, password.value).then(res => {
        db.ref("usuarios/motoristas/" + res.user.uid).set(info);
      });
    }

    function iniciarRastreamento() {
      navigator.geolocation.watchPosition(pos => {
        db.ref("usuarios/motoristas/" + auth.currentUser.uid + "/posicao").set({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        });
      }, null, { enableHighAccuracy: true });
    }

    function ouvirCorridas() {
      db.ref("corridas_ativas").on("value", snap => {
        const lista = document.getElementById("listaChamadas");
        lista.innerHTML = "";
        snap.forEach(cSnap => {
          const c = cSnap.val();
          if(c.status === "aguardando") {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<b>Destino:</b> ${c.destinoNome}<br><button onclick="aceitar('${cSnap.key}')">ACEITAR</button>`;
            lista.appendChild(div);
          }
        });
      });
    }

    function aceitar(id) {
      db.ref("corridas_ativas/" + id).update({
        status: "Motorista a caminho",
        motoristaId: auth.currentUser.uid
      }).then(() => alert("Corrida aceita! O passageiro já está te vendo no mapa."));
    }
  </script>
</body>
</html>
