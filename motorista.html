<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mydi Car - Motorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin:0; background:#f0f4f7; }
    h1 { background:#28a745; color:#fff; padding:15px; margin:0; text-align:center; font-size: 20px; }
    .screen { display:none; padding:20px; }
    .active { display:block; }
    .card { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
    input, button { width:100%; padding:14px; margin:6px 0; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; font-size: 16px; }
    button { background:#28a745; color:#fff; font-weight:bold; border:none; cursor:pointer; }
    button:active { transform: scale(0.98); }
    .btn-secondary { background:#6c757d; margin-top: 10px; }
    .status-online { background:#d4edda; color:#155724; padding:10px; border-radius:8px; text-align:center; margin-bottom:15px; font-weight: bold; }
    .chamada-card { border-left: 5px solid #28a745; position: relative; }
    .info-rota { font-size: 14px; color: #444; margin: 10px 0; }
    .label-local { font-weight: bold; color: #28a745; }
  </style>
</head>
<body>

  <h1>Painel do Motorista</h1>

  <div id="authScreen" class="screen active">
    <div class="card">
      <input id="email" type="email" placeholder="Seu E-mail">
      <input id="password" type="password" placeholder="Sua Senha">
      <button onclick="fazerLogin()">Entrar</button>
      <hr>
      <p style="text-align:center; color:#666;">Novo por aqui? Cadastre seu veículo:</p>
      <input id="nome" placeholder="Nome Completo">
      <input id="modelo" placeholder="Modelo do Carro (Ex: Corsa)">
      <input id="cor" placeholder="Cor">
      <input id="placa" placeholder="Placa">
      <button onclick="registrar()" class="btn-secondary">Cadastrar como Motorista</button>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <div class="status-online">📍 Você está ONLINE</div>
    
    <div class="card">
      <h3 style="margin-top:0;">Chamadas Disponíveis</h3>
      <div id="listaChamadas">
        <p style="color:#888;">Aguardando novas chamadas...</p>
      </div>
    </div>

    <button onclick="auth.signOut(); location.reload();" style="background:#ff4444;">Ficar Offline (Sair)</button>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('appScreen').classList.add('active');
        iniciarRastreamento();
        ouvirCorridas();
      }
    });

    function fazerLogin() {
      auth.signInWithEmailAndPassword(email.value, password.value).catch(e => alert("Erro: " + e.message));
    }

    function registrar() {
      const emailVal = document.getElementById("email").value;
      const passVal = document.getElementById("password").value;
      const info = {
        nome: document.getElementById("nome").value,
        modelo: document.getElementById("modelo").value,
        cor: document.getElementById("cor").value,
        placa: document.getElementById("placa").value,
        tipo: "motorista"
      };
      if(!info.nome || !info.placa) return alert("Preencha os dados do veículo!");

      auth.createUserWithEmailAndPassword(emailVal, passVal)
        .then(res => db.ref("usuarios/motoristas/" + res.user.uid).set(info))
        .catch(e => alert(e.message));
    }

    function iniciarRastreamento() {
      navigator.geolocation.watchPosition(pos => {
        const path = "usuarios/motoristas/" + auth.currentUser.uid + "/posicao";
        db.ref(path).set({
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          timestamp: Date.now()
        });
      }, err => console.error(err), { enableHighAccuracy: true });
    }

    function ouvirCorridas() {
      db.ref("corridas_ativas").on("value", snap => {
        const lista = document.getElementById("listaChamadas");
        lista.innerHTML = "";
        let temCorrida = false;

        snap.forEach(cSnap => {
          const c = cSnap.val();
          if(c.status === "aguardando") {
            temCorrida = true;
            const div = document.createElement("div");
            div.className = "card chamada-card";
            div.innerHTML = `
              <strong>🔔 Nova Solicitação</strong>
              <div class="info-rota">
                <span class="label-local">DE:</span> ${c.origemNome || "Localização atual"}<br>
                <span class="label-local">PARA:</span> ${c.destinoNome}
              </div>
              <button onclick="aceitar('${cSnap.key}', ${c.origemLat}, ${c.origemLng})">ACEITAR CORRIDA</button>
            `;
            lista.appendChild(div);
          }
        });

        if(!temCorrida) lista.innerHTML = '<p style="color:#888;">Nenhuma chamada no momento...</p>';
      });
    }

    function aceitar(id, lat, lng) {
      db.ref("corridas_ativas/" + id).update({
        status: "motorista_a_caminho",
        motoristaId: auth.currentUser.uid
      }).then(() => {
        alert("Corrida aceita! Abrindo GPS para o passageiro...");
        // Abre o Google Maps com a rota para o passageiro
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
      });
    }
  </script>
</body>
</html>
