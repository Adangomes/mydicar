<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mydi Car - Motorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin:0; background:#f0f4f7; }
    h1 { background:#28a745; color:#fff; padding:15px; margin:0; text-align:center; font-size: 20px; }
    .screen { display:none; padding:15px; }
    .active { display:block; }
    .card { background:#fff; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
    button { width:100%; padding:15px; margin:10px 0; border-radius:8px; border:none; font-weight:bold; cursor:pointer; font-size:16px; }
    .btn-aceitar { background:#28a745; color:#fff; }
    .btn-acao { background:#ffc107; color:#000; }
    .info { font-size:14px; color:#555; }
    .valor-ganho { color:#28a745; font-size:20px; font-weight:bold; }
  </style>
</head>
<body>
  <h1>Painel Motorista</h1>

  <div id="authScreen" class="screen active">
    <div class="card">
      <input id="email" placeholder="E-mail" style="width:90%; padding:10px; margin:5px;">
      <input id="senha" type="password" placeholder="Senha" style="width:90%; padding:10px; margin:5px;">
      <button onclick="fazerLogin()" class="btn-aceitar">Entrar</button>
      <button onclick="registrar()" style="background:#6c757d; color:#fff;">Registrar Carro</button>
    </div>
  </div>

  <div id="appScreen" class="screen">
    <div id="listaChamadas"></div>
    
    <div id="corridaAtiva" class="card" style="display:none;">
      <h3>Corrida em Andamento</h3>
      <p id="infoCorrida" class="info"></p>
      <p>Seu ganho: <span id="meuGanho" class="valor-ganho"></span></p>
      <button id="btnProximoPasso" onclick="proximoPasso()" class="btn-acao"></button>
    </div>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg", authDomain: "myproject26-10f0e.firebaseapp.com", databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com", projectId: "myproject26-10f0e" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let corridaAtualId = null;
    let statusAtual = "";
    let motoristaPos = null;

    auth.onAuthStateChanged(user => { if (user) { 
        document.getElementById('authScreen').classList.remove('active'); 
        document.getElementById('appScreen').classList.add('active');
        ouvirChamadas();
        rastrearMotorista();
    }});

    function rastrearMotorista() {
      navigator.geolocation.watchPosition(pos => {
        motoristaPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        db.ref("usuarios/motoristas/" + auth.currentUser.uid + "/posicao").set(motoristaPos);
      }, null, { enableHighAccuracy: true });
    }

    function ouvirChamadas() {
      db.ref("corridas_ativas").on("value", snap => {
        const lista = document.getElementById("listaChamadas");
        const painelAtivo = document.getElementById("corridaAtiva");
        lista.innerHTML = "";
        
        snap.forEach(cSnap => {
          const c = cSnap.val();
          // Se for uma chamada nova
          if(c.status === "aguardando") {
            lista.innerHTML += `
              <div class="card">
                <b>Nova Chamada!</b><br>Para: ${c.destinoNome}<br>
                Ganho: R$ ${c.valorMotorista}<br>
                <button class="btn-aceitar" onclick="aceitar('${cSnap.key}')">ACEITAR</button>
              </div>`;
          }
          // Se for a corrida que este motorista aceitou
          if(c.motoristaId === auth.currentUser.uid && c.status !== "finalizada") {
            corridaAtualId = cSnap.key;
            statusAtual = c.status;
            lista.style.display = "none";
            painelAtivo.style.display = "block";
            atualizarPainelAtivo(c);
          }
        });
      });
    }

    function aceitar(id) {
      db.ref("corridas_ativas/" + id).update({ status: "a_caminho", motoristaId: auth.currentUser.uid });
    }

    function atualizarPainelAtivo(c) {
      const btn = document.getElementById("btnProximoPasso");
      document.getElementById("infoCorrida").innerText = "Destino: " + c.destinoNome;
      document.getElementById("meuGanho").innerText = "R$ " + c.valorMotorista;

      if(statusAtual === "a_caminho") {
        btn.innerText = "CHEGUEI NO LOCAL";
      } else if(statusAtual === "no_local") {
        btn.innerText = "PASSAGEIRO EMBARCOU (INICIAR)";
      } else if(statusAtual === "em_curso") {
        btn.innerText = "FINALIZAR CORRIDA";
      }
    }

    function proximoPasso() {
      let novoStatus = "";
      if(statusAtual === "a_caminho") novoStatus = "no_local";
      else if(statusAtual === "no_local") novoStatus = "em_curso";
      else if(statusAtual === "em_curso") {
        novoStatus = "finalizada";
        alert("Corrida Finalizada! Valor a receber: " + document.getElementById("meuGanho").innerText);
        location.reload();
      }
      db.ref("corridas_ativas/" + corridaAtualId).update({ status: novoStatus });
    }

    function fazerLogin() { auth.signInWithEmailAndPassword(email.value, senha.value); }
    function registrar() { 
      const info = { nome: "Adan Motorista", modelo: "Renegade", cor: "Preto", placa: "ABC-1234" };
      auth.createUserWithEmailAndPassword(email.value, senha.value).then(res => db.ref("usuarios/motoristas/"+res.user.uid).set(info));
    }
  </script>
</body>
</html>
