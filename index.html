<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Medicar - Passageiro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; }
    h1 { background:#0077cc; color:#fff; padding:15px; margin:0; text-align:center; }
    .screen { display:none; padding:20px; }
    .active { display:block; }
    input, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #ccc; font-size:16px; box-sizing: border-box; }
    button { background:#0077cc; color:#fff; font-weight:bold; cursor:pointer; border:none; }
    button:hover { background:#005fa3; }
    ul { list-style:none; padding:0; }
    li { background:#fff; margin:5px 0; padding:10px; border-radius:5px; border:1px solid #ddd; }
    #map { height:300px; width:100%; border-radius:8px; margin-top:15px; }
  </style>
</head>
<body>
  <h1>Medicar - Passageiro</h1>

  <div id="authScreen" class="screen active">
    <h2>Entrar / Cadastrar</h2>
    <input id="email" type="email" placeholder="Seu Email">
    <input id="password" type="password" placeholder="Sua Senha">
    <button onclick="register()">Cadastrar Novo Usuário</button>
    <button onclick="login()" style="background:#28a745;">Entrar</button>
  </div>

  <div id="appScreen" class="screen">
    <h2>Solicitar Corrida</h2>
    <input id="destino" placeholder="Destino (Ex: Jaraguá, Guaramirim)">
    <button onclick="solicitarCorrida()">Solicitar Agora</button>
    <h3>Minhas Corridas</h3>
    <ul id="minhasCorridas"></ul>
    <div id="map"></div>
  </div>

  <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCXA1yP1F-riNkzOX5zJs5gsQ82EzsT7Qg",
        authDomain: "myproject26-10f0e.firebaseapp.com",
        databaseURL: "https://myproject26-10f0e-default-rtdb.firebaseio.com",
        projectId: "myproject26-10f0e",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const realtime = firebase.database();

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function register() {
      const e = document.getElementById("email").value;
      const p = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(e, p)
        .then(() => alert("Cadastrado! Agora faça o login."))
        .catch(err => alert("Erro: " + err.message));
    }

    function login() {
      const e = document.getElementById("email").value;
      const p = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(e, p)
        .then(() => { showScreen("appScreen"); carregarCorridas(); })
        .catch(err => alert("Erro: " + err.message));
    }

    function solicitarCorrida() {
      const destino = document.getElementById("destino").value.toLowerCase();
      if (!destino) return alert("Digite um destino");
      
      const valor = destino.includes("guaramirim") ? 15 : (destino.includes("schroeder") ? 18 : 10);
      
      realtime.ref("corridas").push({
        usuario: auth.currentUser.email,
        destino: destino,
        status: "aguardando",
        valor: valor,
        horario: new Date().toLocaleString()
      }).then(() => alert("Corrida solicitada! Valor estimado: R$ " + valor));
    }

    function carregarCorridas() {
      realtime.ref("corridas").orderByChild("usuario").equalTo(auth.currentUser.email).on("value", snap => {
        const lista = document.getElementById("minhasCorridas");
        lista.innerHTML = "";
        snap.forEach(c => {
          const d = c.val();
          const li = document.createElement("li");
          li.innerText = `${d.destino} - R$ ${d.valor} (${d.status})`;
          lista.appendChild(li);
        });
      });
    }

    const map = L.map('map').setView([-26.48, -49.07], 13);
    L.tileLayer('https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=208f6874a48c45e68761f3d994db6775', {
      maxZoom: 20
    }).addTo(map);
  </script>
</body>
</html>
